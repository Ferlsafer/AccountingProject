{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign In — TBC Management System</title>
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#1e2d50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="{% static 'img/gas-station.png' %}">
    <link rel="apple-touch-icon" href="{% static 'img/gas-station.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f1c35;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
        }

        /* Animated background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: #2563eb;
            top: -120px; left: -120px;
            animation: drift 12s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: #7c3aed;
            bottom: -100px; right: -100px;
            animation: drift 15s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        /* Brand */
        .brand-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
            margin: 0 auto 20px;
            box-shadow: 0 12px 36px rgba(37,99,235,.45);
        }
        .brand-title {
            color: #fff;
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .brand-sub {
            color: #64748b;
            font-size: 0.88rem;
        }

        /* Card */
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            padding: 36px 32px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 24px 64px rgba(0,0,0,.45);
            margin-top: 28px;
        }

        /* Inputs */
        .field-label {
            color: #94a3b8;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            display: block;
        }
        .input-wrap {
            margin-bottom: 20px;
        }
        .input-inner {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 1rem;
            pointer-events: none;
            z-index: 1;
        }
        .login-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 13px 14px 13px 42px;
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .login-input::placeholder { color: #475569; }
        .login-input:focus {
            border-color: #2563eb;
            background: rgba(37,99,235,0.10);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.20);
        }
        .login-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 100px #1e2d50 inset;
            -webkit-text-fill-color: #f1f5f9;
        }

        /* Toggle password */
        .toggle-pw {
            position: absolute;
            right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; padding: 0;
            color: #475569; cursor: pointer; font-size: 1rem;
            transition: color 0.15s;
        }
        .toggle-pw:hover { color: #94a3b8; }

        /* Error */
        .login-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.30);
            border-radius: 12px;
            color: #fca5a5;
            font-size: 0.85rem;
            padding: 12px 16px;
            display: flex; align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        /* Submit button */
        .btn-signin {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(37,99,235,.40);
            letter-spacing: 0.02em;
        }
        .btn-signin:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(37,99,235,.50);
        }
        .btn-signin:active { transform: translateY(0); }

        /* Footer */
        .login-footer {
            text-align: center;
            color: #334155;
            font-size: 0.78rem;
            margin-top: 24px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; border-radius: 16px; }
            .brand-icon { width: 60px; height: 60px; font-size: 1.6rem; border-radius: 16px; }
        }
    </style>
</head>
<body>

<div class="login-wrap">

    <div class="text-center">
        <div class="brand-icon">
            <i class="bi bi-bar-chart-fill"></i>
        </div>
        <div class="brand-title">TBC Management System</div>
        <div class="brand-sub">Fuel &amp; Cargo</div>
    </div>

    <div class="login-card">

        {% if form.errors %}
        <div class="login-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" autocomplete="on">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

            <div class="input-wrap">
                <label class="field-label" for="id_username">Username</label>
                <div class="input-inner">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="username" id="id_username" autofocus
                        class="login-input" placeholder="Enter your username"
                        value="{{ form.username.value|default:'' }}" autocomplete="username">
                </div>
            </div>

            <div class="input-wrap" style="margin-bottom:8px">
                <label class="field-label" for="id_password">Password</label>
                <div class="input-inner">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" id="id_password"
                        class="login-input" placeholder="Enter your password"
                        autocomplete="current-password" style="padding-right:44px">
                    <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
                        <i class="bi bi-eye" id="togglePwIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-signin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
    </div>

    <div class="login-footer">
        TBC Management System &copy; {% now "Y" %}
    </div>
</div>

<script>
    const btn  = document.getElementById('togglePw');
    const inp  = document.getElementById('id_password');
    const icon = document.getElementById('togglePwIcon');
    btn.addEventListener('click', () => {
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
    }
</script>

</body>
</html>
